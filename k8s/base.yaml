apiVersion: v1
kind: Namespace
metadata:
  name: fraud-guardian
  labels:
    app.kubernetes.io/name: toast-fraud-guardian
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-guardian-config
  namespace: fraud-guardian
data:
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  APP_WORKERS: "4"
  LOG_LEVEL: "INFO"
  OTEL_SERVICE_NAME: "toast-fraud-guardian"
  MODEL_VERSION: "v1.0.0"
  FRAUD_SCORE_THRESHOLD_AUTO: "0.85"
  FRAUD_SCORE_THRESHOLD_REVIEW: "0.50"
  PII_RETENTION_DAYS: "90"
  AUDIT_LOG_RETENTION_DAYS: "2555"
  FF_AUTO_SUBMIT_DISPUTES: "false"
  FF_SEQUENCE_MODEL_ENABLED: "true"
  FF_LLM_EVIDENCE_WRITER: "true"
