apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-guardian-api
  namespace: fraud-guardian
  labels:
    app: fraud-guardian-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-guardian-api
  template:
    metadata:
      labels:
        app: fraud-guardian-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fraud-guardian
      containers:
        - name: api
          image: toast-fraud-guardian:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fraud-guardian-config
            - secretRef:
                name: fraud-guardian-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-volume
              mountPath: /app/ml/export
              readOnly: true
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-guardian-api
  namespace: fraud-guardian
spec:
  selector:
    app: fraud-guardian-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-guardian-api-hpa
  namespace: fraud-guardian
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-guardian-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: fraud_score_latency_seconds
        target:
          type: AverageValue
          averageValue: "200m"  # 200ms
